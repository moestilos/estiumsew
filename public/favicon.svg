<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">

  <!-- Fondo redondeado oscuro -->
  <rect width="32" height="32" rx="8" fill="#231A16"/>

  <!-- Cuerpo del alfiler (shaft) -->
  <rect x="14.8" y="12.5" width="2.4" height="13.5" rx="1.2" fill="#E8DDD8"/>

  <!-- Punta del alfiler -->
  <path d="M14.8 25.5 Q16 29.5 17.2 25.5" fill="#E8DDD8"/>

  <!-- Cabeza del alfiler (bola decorativa) — color rosa dorado de la marca -->
  <circle cx="16" cy="8.5" r="5.5" fill="#C9907A"/>

  <!-- Segundo círculo interior para volumen -->
  <circle cx="16" cy="8.5" r="3.5" fill="#D9A08E"/>

  <!-- Reflejo especular para efecto perla -->
  <circle cx="14.4" cy="6.9" r="1.6" fill="rgba(255,255,255,0.22)"/>

  <!-- Punto interior del alfiler (marca de calidad) -->
  <circle cx="16" cy="8.5" r="1" fill="rgba(180,90,65,0.4)"/>

</svg>
